spring.datasource.url=jdbc:h2:mem:busline_test;MODE=PostgreSQL;DATABASE_TO_UPPER=false;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.globally_quoted_identifiers=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.jpa.properties.hibernate.format_sql=false

app.security.jwt.secret=test-secret-key-for-context-loads-only-test-secret-key
app.security.jwt.expiration-ms=86400000
app.security.default-role=Customer
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

logging.level.root=warn
logging.level.com.busline.tranmaunhan=info
